<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hindi Font Designer Pro</title>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9698100648606421" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/fabric@5.3.0/dist/fabric.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@800&family=Modak&family=Gajraj+One&family=Yatra+One&family=Teko:wght@600&family=Kalam:wght@700&family=Rozha+One&family=Ranga:wght@700&family=Kurale&family=Akshar:wght@700&family=Tillana:wght@800&family=Laila:wght@700&family=Biryani:wght@900&family=Inknut+Antiqua:wght@800&family=Gotu&display=swap" rel="stylesheet">

    <style>
        :root { 
            --gold: #FFD966; 
            --metallic-purple: #4b0082; 
            --metallic-black: #0d0d0d;
            --purple-glow: rgba(138, 43, 226, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: linear-gradient(180deg, #000 0%, #1a0533 100%);
            color: #fff; font-family: 'Mukta', sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        .ad-top { width: 100%; height: 50px; background: #000; border-bottom: 1px solid #222; flex-shrink: 0; }

        .header { 
            background: linear-gradient(90deg, #000, #2e0854, #000); 
            padding: 10px; text-align: center; border-bottom: 2px solid var(--metallic-purple); flex-shrink: 0;
        }
        .header h1 { font-size: 15px; color: #d8b4fe; text-transform: uppercase; letter-spacing: 2px; font-weight: 900; }

        .workspace {
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; align-items: center; scrollbar-width: none;
        }
        .workspace::-webkit-scrollbar { display: none; }

        /* Metallic Purple Canvas Border */
        .canvas-frame {
            width: 100%; max-width: 350px; aspect-ratio: 1/1;
            background: #000; 
            border: 4px solid var(--metallic-purple); 
            border-radius: 12px;
            box-shadow: 0 0 25px var(--purple-glow); 
            margin-bottom: 20px; overflow: hidden; flex-shrink: 0;
        }

        .tool-card {
            width: 100%; max-width: 380px; 
            background: linear-gradient(145deg, #160729, #0d0d0d); 
            border-radius: 15px; padding: 15px; margin-bottom: 12px; 
            border: 1px solid rgba(138, 43, 226, 0.3);
        }
        .label { font-size: 10px; color: #d8b4fe; text-transform: uppercase; font-weight: 900; margin-bottom: 10px; display: block; }

        .h-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
        .h-scroll::-webkit-scrollbar { display: none; }

        .color-dot { min-width: 44px; height: 44px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); cursor: pointer; flex-shrink: 0; }
        .font-pill { 
            background: #2a0a4d; padding: 10px 22px; border-radius: 25px; 
            border: 1px solid var(--metallic-purple); white-space: nowrap; font-size: 16px; 
            color: #fff; cursor: pointer;
        }

        .slider-row { margin-bottom: 10px; }
        .slider-info { display: flex; justify-content: space-between; font-size: 11px; color: #aaa; margin-bottom: 4px; }
        input[type=range] { width: 100%; accent-color: var(--metallic-purple); cursor: pointer; }

        .action-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 380px; margin-bottom: 20px; }
        .btn-ui { padding: 14px; border-radius: 10px; border: none; font-weight: 900; font-size: 11px; text-transform: uppercase; cursor: pointer; color: #fff; }
        .bg-purp { background: var(--metallic-purple); }
        .bg-blue { background: #2980b9; }
        .bg-red { background: #c0392b; }

        .footer { padding: 12px; background: #000; border-top: 1px solid #333; text-align: center; }
        .btn-save { 
            width: 160px; padding: 12px; border-radius: 30px; 
            background: linear-gradient(135deg, #8a2be2, #4b0082); 
            color: #fff; font-weight: 900; font-size: 14px; border: none;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
        }
    </style>
</head>
<body>

    <div class="ad-top">
        <ins class="adsbygoogle" style="display:inline-block;width:320px;height:50px" data-ad-client="ca-pub-9698100648606421" data-ad-slot="8032700239"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div class="header"><h1>Hindi Font Designer</h1></div>

    <div class="workspace">
        <div class="canvas-frame"><canvas id="mainC"></canvas></div>

        <div class="action-row">
            <button class="btn-ui bg-purp" onclick="addT()">+ Text</button>
            <button class="btn-ui bg-blue" onclick="document.getElementById('f').click()">🖼 Photo</button>
            <button class="btn-ui bg-red" onclick="del()">🗑 Delete</button>
            <input type="file" id="f" hidden accept="image/*">
        </div>

        <div class="tool-card">
            <span class="label">क्रांतिकारी Effects</span>
            <div class="slider-row">
                <div class="slider-info"><span>Text Glow</span> <b id="valG">0</b></div>
                <input type="range" id="rangeG" min="0" max="60" value="0">
            </div>
            <div class="slider-row">
                <div class="slider-info"><span>Bg Blur (Photo Only)</span> <b id="valB">0</b></div>
                <input type="range" id="rangeB" min="0" max="40" value="0">
            </div>
        </div>

        <div class="tool-card">
            <span class="label">क्रांतिकारी हिंदी फोंट्स</span>
            <div id="fontBox" class="h-scroll"></div>
        </div>

        <div class="tool-card">
            <span class="label">Text Colors (अक्षर का रंग)</span>
            <div id="textColBox" class="h-scroll"></div>
        </div>

        <div class="tool-card">
            <span class="label">Canvas Colors (बैकग्राउंड रंग)</span>
            <div id="bgColBox" class="h-scroll"></div>
        </div>
    </div>

    <div class="footer">
        <button class="btn-save" onclick="save()">Save Design 💾</button>
    </div>

    <script>
        let canvas;
        const fonts = ['Mukta', 'Modak', 'Gajraj One', 'Yatra One', 'Teko', 'Kalam', 'Rozha One', 'Ranga', 'Kurale', 'Akshar', 'Tillana', 'Laila', 'Biryani', 'Inknut Antiqua', 'Gotu'];
        const colorPalette = ['#FFD966', '#FFFFFF', '#FF4444', '#00FBFF', '#FF00FF', '#39FF14', '#000000', '#FF8C00', '#8a2be2', '#2ecc71', '#34495e'];

        window.onload = function() {
            const frame = document.querySelector('.canvas-frame');
            canvas = new fabric.Canvas('mainC', {
                width: frame.clientWidth, height: frame.clientWidth,
                backgroundColor: '#000', preserveObjectStacking: true
            });

            fabric.Object.prototype.set({
                transparentCorners: false, cornerColor: '#8a2be2', cornerSize: 12, cornerStyle: 'circle', borderColor: '#8a2be2'
            });

            // Glow Logic
            document.getElementById('rangeG').oninput = function() {
                document.getElementById('valG').innerText = this.value;
                let a = canvas.getActiveObject();
                if(a && a.type.includes('text')) {
                    a.set('shadow', new fabric.Shadow({ color: a.fill, blur: parseInt(this.value), offsetX: 0, offsetY: 0 }));
                    canvas.requestRenderAll();
                }
            };

            // Blur Logic
            document.getElementById('rangeB').oninput = function() {
                document.getElementById('valB').innerText = this.value;
                let bg = canvas.backgroundImage;
                if(bg) {
                    bg.filters = [new fabric.Image.filters.Blur({ blur: this.value / 15 })];
                    bg.applyFilters();
                    canvas.requestRenderAll();
                }
            };

            initUI();
            addT("नया डिज़ाइन");

            document.getElementById('f').onchange = (e) => {
                let r = new FileReader();
                r.onload = (ev) => {
                    fabric.Image.fromURL(ev.target.result, (img) => {
                        img.scaleToWidth(canvas.width);
                        canvas.setBackgroundImage(img, canvas.requestRenderAll.bind(canvas));
                    });
                };
                r.readAsDataURL(e.target.files[0]);
            };
        };

        function initUI() {
            const fb = document.getElementById('fontBox'), tc = document.getElementById('textColBox'), bc = document.getElementById('bgColBox');
            
            fonts.forEach(f => {
                let p = document.createElement('div'); p.className = 'font-pill'; p.innerText = 'अ '+f; p.style.fontFamily = f;
                p.onclick = () => { let a = canvas.getActiveObject(); if(a) { a.set('fontFamily', f); canvas.requestRenderAll(); } };
                fb.appendChild(p);
            });

            colorPalette.forEach(c => {
                // Text Color Dots
                let d1 = document.createElement('div'); d1.className = 'color-dot'; d1.style.background = c;
                d1.onclick = () => { let a = canvas.getActiveObject(); if(a) { a.set('fill', c); canvas.renderAll(); } };
                tc.appendChild(d1);

                // Background Color Dots
                let d2 = document.createElement('div'); d2.className = 'color-dot'; d2.style.background = c;
                d2.onclick = () => { 
                    canvas.setBackgroundImage(null); 
                    canvas.setBackgroundColor(c, canvas.renderAll.bind(canvas)); 
                };
                bc.appendChild(d2);
            });
        }

        function addT(v = "यहाँ लिखें") {
            let t = new fabric.IText(v, {
                left: canvas.width/2, top: canvas.height/2, originX: 'center', originY: 'center',
                fill: '#FFD966', fontSize: 45, fontFamily: 'Mukta', fontWeight: 'bold'
            });
            canvas.add(t).setActiveObject(t);
            canvas.requestRenderAll();
        }

        function del() {
            let a = canvas.getActiveObject();
            if(a) { canvas.remove(a); canvas.discardActiveObject(); canvas.requestRenderAll(); }
        }

        function save() {
            const data = canvas.toDataURL({ multiplier: 3, format: 'png' });
            const l = document.createElement('a'); l.download = 'Design.png'; l.href = data; l.click();
            if(window.Android && window.Android.showInterstitial) window.Android.showInterstitial();
        }
    </script>
</body>
</html>
